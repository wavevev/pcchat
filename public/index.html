<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>9996</title>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    @font-face{
      font-family:"DungGeunMo";
      src:
        url("./fonts/DungGeunMo.woff2") format("woff2"),
        url("./fonts/DungGeunMo.woff") format("woff");
      font-display:swap;
    }

    :root{
      --bg:#00009b;
      --fg:#ffffff;
      --hi:#ffff66;
      --cyan:#00ffff;
      --scan:rgba(255,255,255,0.05);

      /* 살짝 축소 */
      --base: 19px;

      --topbar-h:60px;
      --inputbar-h:92px;
    }

    html,body{
      margin:0; padding:0; height:100%;
      background:var(--bg); color:var(--fg);
      font-family:"DungGeunMo", monospace;
      font-size: var(--base);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      letter-spacing: 0px;

      /* ✅ 페이지 스크롤 없애기 */
      overflow: hidden;
    }
    input, button{
      font-family: inherit;
      font-size: inherit;
      color: var(--fg);
      letter-spacing: 0px;
    }

    /* CRT scanline */
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background: repeating-linear-gradient(
        to bottom,
        var(--scan) 0px,
        var(--scan) 1px,
        transparent 1px,
        transparent 3px
      );
      mix-blend-mode: overlay;
      opacity:.9;
      animation: flicker .14s infinite;
    }
    @keyframes flicker{
      0%{opacity:.88;}
      50%{opacity:.95;}
      100%{opacity:.90;}
    }

    /* ===== 공통 화면 고정 (iPad 높이 흔들림 완화) ===== */
    #loginScreen, #chatScreen{
      position: fixed;
      inset: 0;
      height: 100dvh;
      width: 100vw;
    }

    /* ========= LOGIN ========= */
    #loginScreen{
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
      box-sizing:border-box;
    }
    .loginWrap{
      width: min(520px, 100%);
      text-align:center;
    }
    .loginGifBox{
      width: 220px;
      height: 220px;
      margin: 0 auto 18px;
      background: var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      border: 2px solid var(--fg); /* ✅ GIF 박스는 테두리 유지(원하면 빼도 됨) */
      box-sizing:border-box;
    }
    .loginGifBox img{
      width:100%;
      height:100%;
      object-fit: cover;
      image-rendering: pixelated;
      display:block;
    }
    .loginTitle{
      line-height: 1.85;
      font-size: 22px;
      margin: 0 0 18px 0;
    }

    /* ✅ “큰 박스(바깥 큰 테두리)” 제거: 컨테이너는 border 없음 */
    .loginPanel{
      border: none;
      padding: 0;
      box-sizing:border-box;
    }
    #nickname{
      width: min(520px, 100%);
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 12px;
      font-size: 22px;
      outline:none;
      box-sizing:border-box;
      text-align:center;
      display:block;
      margin: 0 auto;
    }
    #enterBtn{
      margin-top: 16px;
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 10px 28px;
      cursor:pointer;
      font-size: 22px;
    }
    #enterBtn:active{ transform: translateY(1px); }

    /* ========= CHAT ========= */
    #chatScreen{
      display:none;
      box-sizing:border-box;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);

      /* ✅ iPad 주소창에 의한 bounce 완화 */
      overscroll-behavior: none;
    }

    /* 채팅 화면은 flex로 고정 */
    .chatCol{
      height: 100%;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    /* 상단바 */
    .topbarWrap{
      flex: 0 0 auto;
      padding-top: 10px;
      background: var(--bg);
    }

    /* ✅ 상단 음영 색: #0000db */
    .topbarHighlight{
      height: 12px;
      background: #0000db;
      margin: 0 12px 6px;
    }

    .topbar{
      height: calc(var(--topbar-h) - 18px);
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;

      /* ✅ 좌/우 여백 조금 증가 */
      padding: 0 28px;

      box-sizing:border-box;
      font-size: 24px;
      letter-spacing: 1px;
    }
    .topLeft{ justify-self:start; }
    .topCenter{ justify-self:center; font-weight:700; letter-spacing: 4px; }
    .topRight{ justify-self:end; }
    .timer{ color: var(--hi); }

    .topbarShadow{
      height: 12px;
      background: rgba(0,0,0,0.28);
      margin: 6px 12px 0;
    }

    /* 채팅 로그 */
    #chatWrap{
      flex: 1 1 auto;
      min-height: 0;
      overflow-y:auto;

      padding: 18px 22px;
      box-sizing:border-box;
      font-size: 22px;

      /* ✅ 줄간격(요청): 촘촘 */
      line-height: 1.55;

      /* iOS 스크롤 자연스럽게 */
      -webkit-overflow-scrolling: touch;
    }

    .line{ white-space: pre-wrap; }
    .notice{ color: var(--cyan); }
    .system{ color: var(--hi); }
    .chat{ color: var(--fg); }

    /* 입력바 */
    .inputbar{
      flex: 0 0 auto;
      box-sizing:border-box;
      display:grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 18px 18px calc(18px + env(safe-area-inset-bottom));
      background: var(--bg);
    }
    #msgInput{
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 14px 14px;
      font-size: 22px;
      outline:none;
    }
    #sendBtn{
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 14px 22px;
      font-size: 22px;
      cursor:pointer;
    }
    #sendBtn:active{ transform: translateY(1px); }

    @media (max-width: 700px){
      :root{ --base:17px; --inputbar-h:84px; --topbar-h:56px; }
      .loginGifBox{ width: 180px; height: 180px; }
      .loginTitle{ font-size: 20px; }
      #nickname, #enterBtn{ font-size: 20px; }
      .topbar{ font-size: 20px; padding: 0 20px; }
      #chatWrap{ font-size: 18px; padding: 16px; }
      #msgInput, #sendBtn{ font-size: 18px; }
      .inputbar{ gap: 12px; }
      .topbarHighlight, .topbarShadow{ margin-left: 10px; margin-right: 10px; }
    }
  </style>
</head>

<body>
  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="loginWrap">
      <div class="loginGifBox">
        <!-- ✅ GIF 넣기: public/media/login.gif -->
        <img src="./media/login.gif" alt="" />
      </div>

      <div class="loginTitle">
        X와의 채팅을 시작합니다.<br/>
        당신의 이름은?
      </div>

      <div class="loginPanel">
        <input id="nickname" autocomplete="off" />
        <button id="enterBtn" type="button">입장</button>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chatScreen">
    <div class="chatCol">
      <div class="topbarWrap">
        <div class="topbarHighlight"></div>
        <div class="topbar">
          <div class="topLeft">접속 인원: <span id="count">0</span></div>
          <div class="topCenter">9996</div>
          <div class="topRight">남은 시간: <span class="timer" id="timer">120</span>초</div>
        </div>
        <div class="topbarShadow"></div>
      </div>

      <div id="chatWrap" aria-live="polite"></div>

      <div class="inputbar">
        <input id="msgInput" autocomplete="off" />
        <button id="sendBtn" type="button">전송</button>
      </div>
    </div>
  </div>

  <script>
    const socket = io();

    const loginScreen = document.getElementById("loginScreen");
    const chatScreen  = document.getElementById("chatScreen");
    const nickEl      = document.getElementById("nickname");
    const enterBtn    = document.getElementById("enterBtn");

    const countEl     = document.getElementById("count");
    const timerEl     = document.getElementById("timer");

    const chatWrap    = document.getElementById("chatWrap");
    const msgInput    = document.getElementById("msgInput");
    const sendBtn     = document.getElementById("sendBtn");

    let isAdmin = false;
    let locked = false;

    // sounds (login 유지, send=soft 딩)
    let audioCtx = null;
    function getCtx(){
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playLoginSound(){
      const ctx = getCtx();
      const o = ctx.createOscillator();
      o.type = "square";
      o.frequency.value = 880;
      o.connect(ctx.destination);
      o.start();
      setTimeout(()=>o.stop(),120);
    }
    function playSendSound(){
      const ctx = getCtx();
      const o = ctx.createOscillator();
      o.type = "sine";
      o.frequency.value = 500;
      o.connect(ctx.destination);
      o.start();
      setTimeout(()=>o.stop(),90);
    }

    function scrollBottom(){
      chatWrap.scrollTop = chatWrap.scrollHeight;
    }
    function addLine(text, cls){
      const div = document.createElement("div");
      div.className = "line " + (cls || "");
      div.textContent = text;
      chatWrap.appendChild(div);
      scrollBottom();
    }

    // ✅ 로그인 엔터 버그 방지 (IME + stopPropagation + 포커스 딜레이)
    let nickComposing = false;
    nickEl.addEventListener("compositionstart", ()=> nickComposing = true);
    nickEl.addEventListener("compositionend", ()=> nickComposing = false);

    function enter(){
      const raw = nickEl.value.trim();
      if(!raw) return;

      loginScreen.style.display = "none";
      chatScreen.style.display  = "block";

      socket.emit("join", raw);

      playLoginSound();

      setTimeout(() => {
        msgInput.focus();
      }, 30);
    }

    nickEl.addEventListener("keydown", (e)=>{
      if (nickComposing || e.isComposing) return;
      if (e.key === "Enter"){
        e.preventDefault();
        e.stopPropagation();
        enter();
      }
    });
    enterBtn.addEventListener("click", enter);

    // send (IME)
    let composing = false;
    msgInput.addEventListener("compositionstart", ()=> composing = true);
    msgInput.addEventListener("compositionend", ()=> composing = false);

    function setInputEnabled(enabled){
      msgInput.disabled = !enabled;
      sendBtn.disabled = !enabled;
    }

    function send(){
      const msg = msgInput.value.trim();
      if(!msg) return;
      if (locked && !isAdmin) return;

      socket.emit("chat", msg);
      msgInput.value = "";
      playSendSound();
    }

    msgInput.addEventListener("keydown", (e)=>{
      if(composing || e.isComposing) return;
      if(e.key === "Enter"){
        e.preventDefault();
        send();
      }
    });
    sendBtn.addEventListener("click", send);

    // socket events
    socket.on("admin", ()=> { isAdmin = true; });

    socket.on("count", (n)=> { countEl.textContent = String(n); });

    // 서버 타이머 표시 (서버가 tick 방송)
    socket.on("tick", (sec)=>{
      timerEl.textContent = String(sec);
    });

    socket.on("locked", (v)=>{
      locked = !!v;
      // ✅ 잠금이면: 관리자만 입력 가능
      setInputEnabled(!locked || isAdmin);

      if (locked) {
        addLine(`[공지] 시간이 종료되었습니다.`, "notice");
      }
    });

    socket.on("system", (msg)=>{
      // 삼각형 없음
      addLine(`[${timerEl.textContent ? "" : ""}] ${msg}`.trim(), "system");
    });

    socket.on("notice", (_nick, msg)=>{
      // 공지에서 9996 제거
      addLine(`[공지] ${msg}`, "notice");
    });

    socket.on("chat", (nick, msg, time)=>{
      addLine(`[${time}] ${nick} : ${msg}`, "chat");
    });

    // 초기 상태: 잠금 가정 X (서버에서 locked 오면 갱신)
    setInputEnabled(true);
  </script>
</body>
</html>
