<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>PC통신 채팅</title>
<script src="/socket.io/socket.io.js"></script>
<style>

body {
  margin:0;
  background:#00009b;
  font-family: 'Courier New', monospace;
  color:white;
}

#loginBox {
  width:600px;
  margin:120px auto;
  padding:50px 60px;
  border:3px solid white;
  text-align:center;
  line-height:1.6;
}

#loginBox h2 {
  margin-bottom:30px;
  line-height:1.8;
}

input {
  width:80%;
  padding:12px;
  font-size:18px;
  background:#00009b;
  border:2px solid white;
  color:white;
}

button {
  margin-top:25px;
  padding:8px 25px;
  font-size:16px;
  background:#00009b;
  border:2px solid white;
  color:white;
  cursor:pointer;
}

#chatBox {
  display:none;
  width:80%;
  max-width:900px;
  margin:40px auto;
  border:3px solid white;
  padding:25px 35px;
}

#messages {
  height:400px;
  overflow-y:auto;
  margin-bottom:15px;
  line-height:1.5;
}

#inputArea {
  display:flex;
}

#msgInput {
  flex:1;
}

.system { color:#ffff66; }
.notice { color:#00ffff; }
.time { color:#aaa; font-size:12px; margin-right:6px; }

@media (max-width:768px) {
  #loginBox {
    width:85%;
    margin:80px auto;
    padding:40px 30px;
  }

  #chatBox {
    width:90%;
    padding:20px;
  }
}

</style>
</head>
<body>

<div id="loginBox">
  <h2>X와의 채팅을 시작합니다.<br/>당신의 이름은?</h2>
  <input id="nickname" />
  <br/>
  <button onclick="join()">입장</button>
</div>

<div id="chatBox">
  <div>접속 인원: <span id="count">0</span></div>
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msgInput" onkeydown="handleKey(event)" />
    <button onclick="send()">전송</button>
  </div>
</div>

<script>
const socket = io();
let isAdmin = false;

function join() {
  const nick = document.getElementById("nickname").value;
  if (!nick) return;
  socket.emit("join", nick);
  document.getElementById("loginBox").style.display="none";
  document.getElementById("chatBox").style.display="block";

  playLoginSound();
}

function send() {
  const input = document.getElementById("msgInput");
  if (!input.value) return;
  socket.emit("chat", input.value);
  input.value="";
  playChatSound();
}

function handleKey(e){
  if(e.key === "Enter") send();
}

socket.on("chat", (nick,msg,time)=>{
  const div = document.createElement("div");
  div.innerHTML = `<span class='time'>[${time}]</span> ${nick} : ${msg}`;
  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop = 999999;
});

socket.on("system", (msg)=>{
  const div = document.createElement("div");
  div.className="system";
  div.innerText = msg;
  document.getElementById("messages").appendChild(div);
});

socket.on("notice", (nick,msg)=>{
  const div = document.createElement("div");
  div.className="notice";
  div.innerText = `[공지] ${nick} : ${msg}`;
  document.getElementById("messages").appendChild(div);
});

socket.on("count", (num)=>{
  document.getElementById("count").innerText = num;
});

socket.on("admin", ()=>{
  isAdmin = true;
  const div = document.createElement("div");
  div.className="notice";
  div.innerText = "[관리자 권한 활성화]";
  document.getElementById("messages").appendChild(div);
});

function playLoginSound(){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.type="square";
  o.frequency.value=880;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),120);
}

function playChatSound(){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.type="triangle";
  o.frequency.value=600;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),70);
}

</script>
</body>
</html>
