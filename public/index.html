<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>9996</title>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    @font-face{
      font-family:"DungGeunMo";
      src:
        url("./fonts/DungGeunMo.woff2") format("woff2"),
        url("./fonts/DungGeunMo.woff") format("woff");
      font-display:swap;
    }

    :root{
      --bg:#00009b;
      --fg:#ffffff;
      --hi:#ffff66;
      --cyan:#00ffff;
      --base: 19px;
      --topbar-h:60px;
    }

    html,body{
      margin:0; padding:0; height:100%;
      background:var(--bg); color:var(--fg);
      font-family:"DungGeunMo", monospace;
      font-size: var(--base);
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow:hidden;
    }
    input, button{
      font-family:inherit;
      font-size:inherit;
      color:var(--fg);
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.055) 0px,
        rgba(255,255,255,0.055) 1px,
        transparent 1px,
        transparent 3px
      );
      mix-blend-mode:overlay;
      opacity:.92;
      animation:flicker .14s infinite;
    }
    @keyframes flicker{
      0%{opacity:.90;}
      50%{opacity:.97;}
      100%{opacity:.92;}
    }

    #loginScreen,#chatScreen{
      position:fixed;
      inset:0;
      height:100dvh;
      width:100vw;
    }

    /* LOGIN */
    #loginScreen{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      box-sizing:border-box;
    }
    .loginWrap{
      width:min(520px,100%);
      text-align:center;
    }
    .loginGifBox{
      width:190px;
      height:190px;
      margin:0 auto 18px;
      background:var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      border:none;
      box-sizing:border-box;
    }
    .loginGifBox img{
      width:100%;
      height:100%;
      object-fit:cover;
      image-rendering:pixelated;
      display:block;
    }
    .loginTitle{
      line-height:1.25;
      font-size:20px;
      margin:0 0 26px 0;
    }
    #nickname{
      width:min(300px,92vw);
      border:2px solid var(--fg);
      background:var(--bg);
      padding:12px;
      font-size:22px;
      outline:none;
      box-sizing:border-box;
      text-align:center;
      display:block;
      margin:0 auto;
    }
    #enterBtn{
      margin-top:16px;
      border:2px solid var(--fg);
      background:var(--bg);
      padding:10px 28px;
      cursor:pointer;
      font-size:20px;
    }

    /* CHAT */
    #chatScreen{
      display:none;
      box-sizing:border-box;
      padding-top:env(safe-area-inset-top);
      padding-bottom:env(safe-area-inset-bottom);
      overscroll-behavior:none;
    }
    .chatCol{
      height:100%;
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .topbarWrap{
      flex:0 0 auto;
      padding-top:10px;
      background:var(--bg);
    }
    .topbarHighlight{
      height:12px;
      background:#0000db;
      margin:0 12px 6px;
    }
    .topbar{
      height:calc(var(--topbar-h) - 18px);
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      padding:0 28px;
      box-sizing:border-box;
      font-size:24px;
      letter-spacing:1px;
    }
    .topLeft{ justify-self:start; }
    .topCenter{
      justify-self:center;
      font-weight:700;
      letter-spacing:4px;
    }
    .topRight{ justify-self:end; }
    .timer{ color:var(--hi); }
    .topbarShadow{
      height:12px;
      background:rgba(0,0,0,0.28);
      margin:6px 12px 0;
    }

    #statusBar{
      flex:0 0 auto;
      padding:8px 22px 0;
      font-size:18px;
      color:var(--hi);
      height:26px;
      box-sizing:border-box;
      display:flex;
      align-items:center;
      opacity:.95;
    }
    #typingText{ flex:1; }

    #chatWrap{
      flex:1 1 auto;
      min-height:0;
      overflow-y:auto;
      padding:10px 22px 18px;
      box-sizing:border-box;
      font-size:22px;
      line-height:1.50;
      -webkit-overflow-scrolling:touch;
    }
    .line{ white-space:pre-wrap; }
    .notice{ color:var(--cyan); }
    .system{ color:var(--hi); }
    .chat{ color:var(--fg); }

    .inputbar{
      flex:0 0 auto;
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      padding:14px 14px calc(14px + env(safe-area-inset-bottom));
      background:var(--bg);
      box-sizing:border-box;
    }
    #msgWrap{
      position:relative;
      width:100%;
    }
    #msgInput{
      width:100%;
      border:2px solid var(--fg);
      border-right:0;
      background:var(--bg);
      padding:14px;
      font-size:22px;
      outline:none;
      caret-color:transparent;
    }
    #sendBtn{
      border:2px solid var(--fg);
      border-left:2px solid #fff;
      background:var(--bg);
      padding:14px 22px;
      font-size:22px;
      cursor:pointer;
    }
    #measure{
      position:absolute;
      left:-9999px;
      top:-9999px;
      white-space:pre;
      font-size:22px;
      font-family:"DungGeunMo", monospace;
    }
    #blockCaret{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      color:var(--fg);
      pointer-events:none;
      animation:blink 1s steps(1,end) infinite;
      font-size:22px;
      line-height:1;
    }
    @keyframes blink{
      0%,49%{opacity:1;}
      50%,100%{opacity:0;}
    }

    #userPanel{
      position:fixed;
      right:18px;
      top:90px;
      width:min(320px,88vw);
      border:2px solid var(--fg);
      background:rgba(0,0,0,0.15);
      padding:12px 12px 10px;
      display:none;
      box-sizing:border-box;
      z-index:50;
    }
    #userPanelTitle{
      color:var(--hi);
      margin-bottom:10px;
      font-size:18px;
    }
    #userList{
      max-height:45vh;
      overflow:auto;
      line-height:1.5;
      font-size:18px;
    }

    #endOverlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,0.45);
      z-index:999;
    }
    #endOverlay .box{
      border:2px solid #fff;
      padding:18px 22px;
      background:rgba(0,0,0,0.25);
      color:#fff;
      font-size:22px;
      line-height:1.35;
      text-align:center;
      min-width:min(520px,90vw);
    }

    @media (max-width:700px){
      :root{ --base:17px; --topbar-h:56px; }
      .topbar{ font-size:20px; padding:0 20px; }
      #statusBar{ padding:8px 16px 0; }
      #chatWrap{ font-size:18px; padding:10px 16px 16px; }
      #msgInput,#sendBtn,#blockCaret,#measure{ font-size:18px; }
      #msgInput{ padding:12px; }
    }
  </style>
</head>
<body>

  <div id="loginScreen">
    <div class="loginWrap">
      <div class="loginGifBox">
        <img src="./media/login.gif" alt="">
      </div>
      <div class="loginTitle">
        X와의 채팅을 시작합니다.<br>
        당신의 이름은?
      </div>
      <input id="nickname" autocomplete="off">
      <button id="enterBtn" type="button">입장</button>
    </div>
  </div>

  <div id="chatScreen">
    <div class="chatCol">
      <div class="topbarWrap">
        <div class="topbarHighlight"></div>
        <div class="topbar">
          <div class="topLeft">접속 인원: <span id="count">0</span></div>
          <div class="topCenter">9996</div>
          <div class="topRight">남은 시간: <span class="timer" id="timer">120</span>초</div>
        </div>
        <div class="topbarShadow"></div>
      </div>

      <div id="statusBar">
        <div id="typingText"></div>
      </div>

      <div id="chatWrap" aria-live="polite"></div>

      <div class="inputbar">
        <div id="msgWrap">
          <input id="msgInput" autocomplete="off">
          <span id="blockCaret">█</span>
          <span id="measure"></span>
        </div>
        <button id="sendBtn" type="button">전송</button>
      </div>
    </div>

    <div id="userPanel">
      <div id="userPanelTitle">접속자 목록 (F2 닫기 / ESC 닫기)</div>
      <div id="userList"></div>
    </div>
  </div>

  <div id="endOverlay">
    <div class="box" id="endBoxText">CONNECTION CLOSED<br>입력이 잠금되었습니다.</div>
  </div>

  <script>
    const socket = io();

    const loginScreen = document.getElementById("loginScreen");
    const chatScreen  = document.getElementById("chatScreen");
    const nickEl      = document.getElementById("nickname");
    const enterBtn    = document.getElementById("enterBtn");

    const countEl     = document.getElementById("count");
    const timerEl     = document.getElementById("timer");
    const typingText  = document.getElementById("typingText");

    const chatWrap    = document.getElementById("chatWrap");
    const msgInput    = document.getElementById("msgInput");
    const sendBtn     = document.getElementById("sendBtn");

    const caretEl     = document.getElementById("blockCaret");
    const measureEl   = document.getElementById("measure");

    const userPanel   = document.getElementById("userPanel");
    const userListEl  = document.getElementById("userList");

    const endOverlay  = document.getElementById("endOverlay");
    const endBoxText  = document.getElementById("endBoxText");

    let isAdmin = false;
    let locked = false;

    function scrollBottom(){
      chatWrap.scrollTop = chatWrap.scrollHeight;
    }

    function addLine(text, cls){
      const div = document.createElement("div");
      div.className = "line " + (cls || "");
      div.textContent = text;
      chatWrap.appendChild(div);
      scrollBottom();
    }

    function resetToLogin(){
      chatWrap.textContent = "";
      typingText.textContent = "";
      endOverlay.style.display = "none";

      isAdmin = false;
      locked = false;

      msgInput.value = "";
      nickEl.value = "";

      chatScreen.style.display = "none";
      loginScreen.style.display = "flex";

      setTimeout(()=> nickEl.focus(), 30);
    }

    function updateBlockCaret(){
      const paddingLeft = 14;
      const inputStyle = getComputedStyle(msgInput);
      measureEl.style.font = inputStyle.font;
      measureEl.textContent = msgInput.value || "";
      const w = measureEl.getBoundingClientRect().width;
      caretEl.style.left = (paddingLeft + w) + "px";
      caretEl.style.opacity = msgInput.disabled ? "0" : "";
    }

    msgInput.addEventListener("input", updateBlockCaret);
    msgInput.addEventListener("focus", updateBlockCaret);
    window.addEventListener("resize", updateBlockCaret);

    // 로그인 IME 버그 방지
    let nickComposing = false;
    nickEl.addEventListener("compositionstart", ()=> nickComposing = true);
    nickEl.addEventListener("compositionend", ()=> nickComposing = false);

    function enter(){
      const raw = nickEl.value.trim();
      if(!raw) return;

      loginScreen.style.display = "none";
      chatScreen.style.display  = "block";

      socket.emit("join", raw);

      setTimeout(() => {
        msgInput.focus();
        updateBlockCaret();
        socket.emit("req_users");
      }, 30);
    }

    nickEl.addEventListener("keydown", (e)=>{
      if (nickComposing || e.isComposing) return;
      if (e.key === "Enter"){
        e.preventDefault();
        e.stopPropagation();
        enter();
      }
    });
    enterBtn.addEventListener("click", enter);

    let composing = false;
    msgInput.addEventListener("compositionstart", ()=> composing = true);
    msgInput.addEventListener("compositionend", ()=> composing = false);

    function setInputEnabled(enabled){
      msgInput.disabled = !enabled;
      sendBtn.disabled = !enabled;
      updateBlockCaret();
    }

    function send(){
      const msg = msgInput.value.trim();
      if(!msg) return;
      if (locked && !isAdmin) return;

      socket.emit("chat", msg);
      msgInput.value = "";
      socket.emit("typing", false);
      updateBlockCaret();
    }

    msgInput.addEventListener("keydown", (e)=>{
      if(composing || e.isComposing) return;
      if(e.key === "Enter"){
        e.preventDefault();
        send();
      }
    });
    sendBtn.addEventListener("click", send);

    // 타이핑
    let typingTimer = null;
    function pingTyping(){
      socket.emit("typing", true);
      clearTimeout(typingTimer);
      typingTimer = setTimeout(()=> socket.emit("typing", false), 1400);
    }

    msgInput.addEventListener("input", ()=>{
      if (locked && !isAdmin) return;
      if (msgInput.value.trim().length === 0){
        socket.emit("typing", false);
        return;
      }
      pingTyping();
    });

    msgInput.addEventListener("blur", ()=> socket.emit("typing", false));

    // 접속자 패널
    function toggleUserPanel(force){
      const show = (typeof force === "boolean") ? force : (userPanel.style.display !== "block");
      userPanel.style.display = show ? "block" : "none";
      if (show) socket.emit("req_users");
    }

    document.addEventListener("keydown", (e)=>{
      if (e.key === "F2"){
        e.preventDefault();
        toggleUserPanel();
      }
      if (e.key === "Escape"){
        toggleUserPanel(false);
      }
    });

    function renderUserList(list){
      userListEl.textContent = "";
      (list || []).forEach((name)=>{
        const div = document.createElement("div");
        div.textContent = "- " + name;
        userListEl.appendChild(div);
      });
    }

    socket.on("admin", ()=>{
      isAdmin = true;
      setInputEnabled(!locked || isAdmin);
    });

    socket.on("users", renderUserList);
    socket.on("count", (n)=> countEl.textContent = String(n));
    socket.on("tick", (sec)=> timerEl.textContent = String(sec));

    socket.on("state", (st)=>{
      timerEl.textContent = String(st.remaining);
      locked = !!st.locked;
      setInputEnabled(!locked || isAdmin);
    });

    socket.on("locked", (v)=>{
      locked = !!v;
      setInputEnabled(!locked || isAdmin);
    });

    socket.on("typing", (text)=> typingText.textContent = text || "");
    socket.on("system", (msg)=> addLine(msg, "system"));
    socket.on("notice", (_nick, msg)=> addLine(`[공지] ${msg}`, "notice"));
    socket.on("chat", (nick, msg, time)=> addLine(`[${time}] ${nick} : ${msg}`, "chat"));

    socket.on("clear", ()=>{
      chatWrap.textContent = "";
      typingText.textContent = "";
    });

    socket.on("kicked", (reason)=>{
      endOverlay.style.display = "flex";
      endBoxText.innerHTML = `퇴장되었습니다.<br>${reason || ""}`;
      locked = true;
      setInputEnabled(false);

      setTimeout(resetToLogin, 1200);
    });

    socket.on("ended", (reason)=>{
      addLine(`[공지] ${reason || "채팅이 종료되었습니다."}`, "system");

      // 관리자는 팝업 안 띄움
      if (!isAdmin){
        endOverlay.style.display = "flex";
        endBoxText.innerHTML = `CONNECTION CLOSED<br>${reason || "채팅이 종료되었습니다."}`;
      }
    });

    socket.on("hideOverlay", ()=>{
      endOverlay.style.display = "none";
    });

    setInputEnabled(true);
  </script>

</body>
</html>
