<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>9996</title>
<script src="/socket.io/socket.io.js"></script>

<style>

/* ===== 둥근모꼴 ===== */
@font-face {
  font-family: 'DungGeunMo';
  src: url('./fonts/DungGeunMo.woff') format('woff');
}

body {
  margin:0;
  background:#000080;
  font-family:'DungGeunMo', monospace;
  color:#ffffff;
}

/* ===== 상단 상태바 ===== */
.topbar {
  background:#000080;
  border-bottom:2px solid #ffffff;
  padding:6px 12px;
  font-size:14px;
  display:flex;
  justify-content:space-between;
}

.timer {
  color:#ffff00;
}

/* ===== 메인 박스 ===== */
.container {
  width:760px;
  margin:30px auto;
  border:2px solid #ffffff;
  padding:15px;
}

/* ===== 로그인 ===== */
#loginBox {
  text-align:center;
  line-height:1.8;
}

#chatBox {
  display:none;
}

#messages {
  height:360px;
  overflow-y:auto;
  margin:15px 0;
  line-height:1.6;
}

/* ===== 입력 ===== */
input {
  background:#000080;
  border:1px solid #ffffff;
  color:#ffffff;
  padding:4px;
  font-family:'DungGeunMo', monospace;
}

button {
  background:#000080;
  border:1px solid #ffffff;
  color:#ffffff;
  padding:4px 12px;
  cursor:pointer;
}

.time { color:#aaaaaa; }
.system { color:#00ffff; }
.notice { color:#ffff00; }

</style>
</head>
<body>

<div class="topbar">
  <div>9996</div>
  <div>남은 시간: <span class="timer" id="timer">120</span>초</div>
</div>

<div class="container">

<div id="loginBox">
  X와의 채팅을 시작합니다.<br/>
  이름을 입력하세요.<br/><br/>
  <input id="nickname"/>
  <br/><br/>
  <button onclick="join()">입장</button>
</div>

<div id="chatBox">

접속 인원: <span id="count">0</span>

<div id="messages"></div>

<input id="msgInput" onkeydown="handleKey(event)" style="width:80%" />
<button onclick="send()">전송</button>

</div>
</div>

<script>
const socket = io();
let timeLeft = 120;
let timerInterval;

/* ===== 타이머 ===== */
function startTimer(){
  timerInterval = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;
    if(timeLeft <= 0){
      clearInterval(timerInterval);
    }
  },1000);
}

/* ===== 로그인 ===== */
function join(){
  const nick = document.getElementById("nickname").value;
  if(!nick) return;

  socket.emit("join", nick);

  document.getElementById("loginBox").style.display="none";
  document.getElementById("chatBox").style.display="block";

  startTimer();
  playLoginSound();
}

/* ===== 채팅 ===== */
function send(){
  const input = document.getElementById("msgInput");
  if(!input.value) return;

  socket.emit("chat", input.value);
  input.value="";
  playChatSound();
}

function handleKey(e){
  if(e.key === "Enter") send();
}

socket.on("chat", (nick,msg,time)=>{
  const div = document.createElement("div");
  div.innerHTML = `<span class='time'>[${time}]</span> ${nick} : ${msg}`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
});

socket.on("system", (msg)=>{
  const div = document.createElement("div");
  div.className="system";
  div.innerText = msg;
  messages.appendChild(div);
});

socket.on("notice", (nick,msg)=>{
  const div = document.createElement("div");
  div.className="notice";
  div.innerText = `[공지] ${nick} : ${msg}`;
  messages.appendChild(div);
});

socket.on("count", (num)=>{
  count.innerText = num;
});

/* ===== 효과음 ===== */

function playLoginSound(){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.type="square";
  o.frequency.value=900;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),120);
}

function playChatSound(){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.type="sine";
  o.frequency.value=500;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),90);
}

</script>
</body>
</html>
