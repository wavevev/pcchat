<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>9996</title>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    @font-face{
      font-family:"DungGeunMo";
      src:
        url("./fonts/DungGeunMo.woff2") format("woff2"),
        url("./fonts/DungGeunMo.woff") format("woff");
      font-display:swap;
    }

    :root{
      --bg:#00009b;
      --fg:#ffffff;
      --hi:#ffff66;
      --cyan:#00ffff;
      --scan:rgba(255,255,255,0.05);

      /* 살짝 축소 */
      --base: 19px;

      --topbar-h:60px;
      --inputbar-h:92px;

      --vvh: 100vh;
      --kb: 0px;
    }

    html,body{
      margin:0; padding:0; height:100%;
      background:var(--bg); color:var(--fg);
      font-family:"DungGeunMo", monospace;
      font-size: var(--base);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      letter-spacing: 0px;
    }
    input, button, textarea, select{
      font-family: inherit;
      font-size: inherit;
      color: var(--fg);
      letter-spacing: 0px;
    }

    /* CRT scanline */
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background: repeating-linear-gradient(
        to bottom,
        var(--scan) 0px,
        var(--scan) 1px,
        transparent 1px,
        transparent 3px
      );
      mix-blend-mode: overlay;
      opacity:.9;
      animation: flicker .14s infinite;
    }
    @keyframes flicker{
      0%{opacity:.88;}
      50%{opacity:.95;}
      100%{opacity:.90;}
    }

    /* ========= LOGIN (2번 캡처 스타일) ========= */
    #loginScreen{
      height: var(--vvh);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
      box-sizing:border-box;
    }
    .loginWrap{
      width: min(520px, 100%);
      text-align:center;
    }
    .loginGifBox{
      width: 220px;
      height: 220px;
      margin: 0 auto 18px;
      background: var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .loginGifBox img{
      width:100%;
      height:100%;
      object-fit: cover;
      image-rendering: pixelated;
    }
    .loginTitle{
      line-height: 1.85;
      font-size: 22px;
      margin: 0 0 18px 0;
    }
    .loginPanel{
      border: 2px solid var(--fg);
      padding: 22px 22px 20px;
      box-sizing:border-box;
    }
    #nickname{
      width: 100%;
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 12px;
      font-size: 22px;
      outline:none;
      box-sizing:border-box;
      text-align:center;
    }
    #enterBtn{
      margin-top: 16px;
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 10px 28px;
      cursor:pointer;
      font-size: 22px;
    }
    #enterBtn:active{ transform: translateY(1px); }

    /* ========= CHAT ========= */
    #chatScreen{
      display:none;
      height: var(--vvh);
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      box-sizing:border-box;
    }

    /* 상단바: 위 여백 + 쨍한 음영 + 텍스트 + 아래 진한 음영 */
    .topbarWrap{
      padding-top: 10px;
      background: var(--bg);
    }
    .topbarHighlight{
      height: 12px;
      background: rgba(255,255,255,0.20);
      margin: 0 12px 6px;
    }
    .topbar{
      height: calc(var(--topbar-h) - 18px);
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      padding: 0 18px;
      box-sizing:border-box;
      font-size: 24px;
      letter-spacing: 1px;
    }
    .topLeft{ justify-self:start; }
    .topCenter{ justify-self:center; font-weight:700; letter-spacing: 4px; }
    .topRight{ justify-self:end; }
    .timer{ color: var(--hi); }
    .topbarShadow{
      height: 12px;
      background: rgba(0,0,0,0.28);
      margin: 6px 12px 0;
    }

    #chatWrap{
      height: calc(var(--vvh) - var(--topbar-h) - var(--inputbar-h) - var(--kb));
      overflow:auto;
      padding: 18px 22px;
      box-sizing:border-box;
      font-size: 22px;

      /* ✅ 줄간격(요청): 살짝 더 촘촘 */
      line-height: 1.55;
      letter-spacing: 0px;
    }

    .line{ white-space: pre-wrap; }
    .notice{ color: var(--cyan); }
    .system{ color: var(--hi); }
    .chat{ color: var(--fg); }

    .inputbar{
      height: calc(var(--inputbar-h) + var(--kb));
      box-sizing:border-box;
      display:grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 18px 18px calc(18px + env(safe-area-inset-bottom));
      background: var(--bg);
    }
    #msgInput{
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 14px 14px;
      font-size: 22px;
      outline:none;
    }
    #sendBtn{
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 14px 22px;
      font-size: 22px;
      cursor:pointer;
    }
    #sendBtn:active{ transform: translateY(1px); }

    @media (max-width: 700px){
      :root{ --base:17px; --inputbar-h:84px; --topbar-h:56px; }
      .loginGifBox{ width: 180px; height: 180px; }
      .loginTitle{ font-size: 20px; }
      #nickname, #enterBtn{ font-size: 20px; }
      .topbar{ font-size: 20px; }
      #chatWrap{ font-size: 18px; padding: 16px; }
      #msgInput, #sendBtn{ font-size: 18px; }
      .inputbar{ gap: 12px; }
      .topbarHighlight, .topbarShadow{ margin-left: 10px; margin-right: 10px; }
    }
  </style>
</head>

<body>
  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="loginWrap">
      <div class="loginGifBox">
        <img src="./media/login.gif" alt="" />
      </div>

      <div class="loginTitle">
        X와의 채팅을 시작합니다.<br/>
        당신의 이름은?
      </div>

      <div class="loginPanel">
        <input id="nickname" autocomplete="off" />
        <button id="enterBtn" type="button">입장</button>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chatScreen">
    <div class="topbarWrap">
      <div class="topbarHighlight"></div>
      <div class="topbar">
        <div class="topLeft">접속 인원: <span id="count">0</span></div>
        <div class="topCenter">9996</div>
        <div class="topRight">남은 시간: <span class="timer" id="timer">120</span>초</div>
      </div>
      <div class="topbarShadow"></div>
    </div>

    <div id="chatWrap" aria-live="polite"></div>

    <div class="inputbar">
      <input id="msgInput" autocomplete="off" />
      <button id="sendBtn" type="button">전송</button>
    </div>
  </div>

  <script>
    const socket = io();

    const loginScreen = document.getElementById("loginScreen");
    const chatScreen  = document.getElementById("chatScreen");
    const nickEl      = document.getElementById("nickname");
    const enterBtn    = document.getElementById("enterBtn");

    const countEl     = document.getElementById("count");
    const timerEl     = document.getElementById("timer");

    const chatWrap    = document.getElementById("chatWrap");
    const msgInput    = document.getElementById("msgInput");
    const sendBtn     = document.getElementById("sendBtn");

    let nickname = "";
    let timeLeft = 120;
    let timerId = null;

    // iOS keyboard / viewport
    function updateViewportVars(){
      const vv = window.visualViewport;
      const height = vv ? vv.height : window.innerHeight;
      document.documentElement.style.setProperty("--vvh", height + "px");
      const kb = Math.max(0, (window.innerHeight - height));
      document.documentElement.style.setProperty("--kb", kb + "px");
    }
    window.addEventListener("resize", updateViewportVars);
    if (window.visualViewport){
      window.visualViewport.addEventListener("resize", updateViewportVars);
      window.visualViewport.addEventListener("scroll", updateViewportVars);
    }
    updateViewportVars();

    // sounds (login 유지, send=soft 딩)
    let audioCtx = null;
    function getCtx(){
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playLoginSound(){
      const ctx = getCtx();
      const o = ctx.createOscillator();
      o.type = "square";
      o.frequency.value = 880;
      o.connect(ctx.destination);
      o.start();
      setTimeout(()=>o.stop(),120);
    }
    function playSendSound(){
      const ctx = getCtx();
      const o = ctx.createOscillator();
      o.type = "sine";
      o.frequency.value = 500;
      o.connect(ctx.destination);
      o.start();
      setTimeout(()=>o.stop(),90);
    }

    // time HH:MM
    function pad2(n){ return String(n).padStart(2,"0"); }
    function nowHM(){
      const d = new Date();
      return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
    }

    function scrollBottom(){
      chatWrap.scrollTop = chatWrap.scrollHeight;
    }
    function addLine(text, cls){
      const div = document.createElement("div");
      div.className = "line " + (cls || "");
      div.textContent = text;
      chatWrap.appendChild(div);
      scrollBottom();
    }

    function startTimer(){
      timerEl.textContent = String(timeLeft);
      if(timerId) clearInterval(timerId);
      timerId = setInterval(()=>{
        timeLeft -= 1;
        timerEl.textContent = String(Math.max(0, timeLeft));
        if(timeLeft <= 0){
          clearInterval(timerId);
          msgInput.disabled = true;
          sendBtn.disabled = true;
          addLine(`[${nowHM()}] 시간이 종료되었습니다.`, "system");
        }
      }, 1000);
    }

    // ✅ 로그인 엔터 버그 해결: IME 조합 체크 + stopPropagation + 포커스 딜레이
    let nickComposing = false;
    nickEl.addEventListener("compositionstart", ()=> nickComposing = true);
    nickEl.addEventListener("compositionend", ()=> nickComposing = false);

    function enter(){
      const raw = nickEl.value.trim();
      if(!raw) return;

      nickname = raw;

      loginScreen.style.display = "none";
      chatScreen.style.display  = "block";

      socket.emit("join", nickname);

      timeLeft = 120;
      msgInput.disabled = false;
      sendBtn.disabled = false;
      startTimer();

      playLoginSound();

      // 포커스는 약간 늦게 (끝 글자 튀는 현상 방지)
      setTimeout(() => {
        msgInput.focus();
        updateViewportVars();
      }, 30);
    }

    nickEl.addEventListener("keydown", (e)=>{
      if (nickComposing || e.isComposing) return;
      if (e.key === "Enter"){
        e.preventDefault();
        e.stopPropagation();
        enter();
      }
    });

    enterBtn.addEventListener("click", enter);

    // send (IME)
    let isComposing = false;
    msgInput.addEventListener("compositionstart", ()=> isComposing = true);
    msgInput.addEventListener("compositionend", ()=> isComposing = false);

    function send(){
      const msg = msgInput.value.trim();
      if(!msg || msgInput.disabled) return;
      socket.emit("chat", msg);
      msgInput.value = "";
      playSendSound();
    }

    msgInput.addEventListener("keydown", (e)=>{
      if(isComposing || e.isComposing) return;
      if(e.key === "Enter"){
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener("click", send);

    // socket events
    socket.on("count", (n)=> { countEl.textContent = String(n); });

    socket.on("system", (msg)=>{
      // ✅ 삼각형 없음
      addLine(`[${nowHM()}] ${msg}`, "system");
    });

    socket.on("notice", (_nick, msg)=>{
      // ✅ 공지에서 9996 제거
      addLine(`[공지] ${msg}`, "notice");
    });

    socket.on("chat", (nick, msg, time)=>{
      addLine(`[${time || nowHM()}] ${nick} : ${msg}`, "chat");
    });
  </script>
</body>
</html>
