<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>9996</title>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    /* ========= Font (iPad/Safari 안정: woff2 우선, woff fallback) ========= */
    @font-face{
      font-family:"DungGeunMo";
      src:
        url("./fonts/DungGeunMo.woff2") format("woff2"),
        url("./fonts/DungGeunMo.woff") format("woff");
      font-display:swap;
    }

    :root{
      --bg:#00009b;
      --fg:#ffffff;
      --hi:#ffff66;     /* 노란 강조 (남은 시간, 시스템) */
      --cyan:#00ffff;   /* 공지 */
      --scan:rgba(255,255,255,0.05);

      --topbar-h:56px;
      --inputbar-h:92px;

      /* iOS 키보드 대응용(스크립트가 갱신) */
      --vvh: 100vh;
      --kb: 0px; /* keyboard overlap */
    }

    html,body{
      margin:0;
      padding:0;
      height:100%;
      background:var(--bg);
      color:var(--fg);
      font-family:"DungGeunMo", monospace;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* ✅ 입력/버튼 폰트 빠지는 문제 방지 */
    input, button, textarea, select{
      font-family: inherit;
      font-size: inherit;
      color: var(--fg);
    }

    /* ========= CRT scanline + 미세 깜빡임 ========= */
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background: repeating-linear-gradient(
        to bottom,
        var(--scan) 0px,
        var(--scan) 1px,
        transparent 1px,
        transparent 3px
      );
      mix-blend-mode: overlay;
      opacity: .9;
      animation: flicker .14s infinite;
    }
    @keyframes flicker{
      0%{opacity:.88;}
      50%{opacity:.95;}
      100%{opacity:.90;}
    }

    /* ========= Login ========= */
    #loginScreen{
      height: var(--vvh);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
      box-sizing:border-box;
    }
    .loginBox{
      width: min(720px, 100%);
      border: 2px solid var(--fg);
      padding: 34px 34px 30px;
      box-sizing:border-box;
      text-align:center;
    }
    .loginTitle{
      line-height: 1.9;
      font-size: 22px;
      margin-bottom: 18px;
      letter-spacing: .5px;
    }
    .loginRow{
      display:flex;
      justify-content:center;
      margin-top: 12px;
    }
    #nickname{
      width: min(520px, 100%);
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 14px 14px;
      box-sizing:border-box;
      outline:none;
      font-size: 22px;
      text-align:center;
    }
    #enterBtn{
      margin-top: 20px;
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 10px 30px; /* 캡처처럼 버튼 짧게 */
      cursor:pointer;
      font-size: 22px;
    }
    #enterBtn:active{ transform: translateY(1px); }

    /* ========= Chat Layout (full screen) ========= */
    #chatScreen{
      display:none;
      height: var(--vvh);
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      box-sizing:border-box;
    }

    /* top bar */
    .topbarWrap{
      border-bottom: 2px solid var(--fg);
      box-shadow: inset 0 -10px 0 rgba(0,0,0,0.15);
    }
    .topbar{
      height: var(--topbar-h);
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      padding: 0 18px;
      box-sizing:border-box;
      font-size: 24px;
      letter-spacing: 1px;
    }
    .topLeft{
      justify-self:start;
    }
    .topCenter{
      justify-self:center;
      font-weight:700;
      letter-spacing: 4px;
    }
    .topRight{
      justify-self:end;
    }
    .timer{
      color: var(--hi);
    }

    /* messages area */
    #chatWrap{
      height: calc(var(--vvh) - var(--topbar-h) - var(--inputbar-h) - var(--kb));
      overflow:auto;
      padding: 18px 22px;
      box-sizing:border-box;
      font-size: 22px;
      line-height: 1.7;
    }

    .line{ white-space: pre-wrap; }
    .time{ opacity:.75; }
    .notice{ color: var(--cyan); }
    .system{ color: var(--hi); }
    .chat{ color: var(--fg); }

    /* input bar */
    .inputbar{
      height: calc(var(--inputbar-h) + var(--kb));
      box-sizing:border-box;
      border-top: 2px solid var(--fg);
      display:grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 18px 18px calc(18px + env(safe-area-inset-bottom));
      background: var(--bg);
    }
    #msgInput{
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 14px 14px;
      font-size: 22px;
      outline:none;
    }
    #sendBtn{
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 14px 22px;
      font-size: 22px;
      cursor:pointer;
    }
    #sendBtn:active{ transform: translateY(1px); }

    /* ========= Responsive (mobile/iPad) ========= */
    @media (max-width: 700px){
      .loginBox{ padding: 28px 22px 24px; }
      .loginTitle{ font-size: 20px; }
      #nickname{ font-size: 20px; }
      #enterBtn{ font-size: 20px; }

      .topbar{ font-size: 20px; }
      #chatWrap{ font-size: 18px; padding: 16px; }
      #msgInput, #sendBtn{ font-size: 18px; }
      :root{ --inputbar-h: 84px; --topbar-h: 52px; }
    }
  </style>
</head>

<body>
  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="loginBox">
      <div class="loginTitle">
        X와의 채팅을 시작합니다.<br/>
        당신의 이름은?
      </div>
      <div class="loginRow">
        <input id="nickname" placeholder="이름을" autocomplete="off" />
      </div>
      <button id="enterBtn" type="button">입장</button>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chatScreen">
    <div class="topbarWrap">
      <div class="topbar">
        <div class="topLeft">접속 인원: <span id="count">0</span></div>
        <div class="topCenter">9996</div>
        <div class="topRight">남은 시간: <span class="timer" id="timer">120</span>초</div>
      </div>
    </div>

    <div id="chatWrap" aria-live="polite"></div>

    <div class="inputbar">
      <input id="msgInput" autocomplete="off" />
      <button id="sendBtn" type="button">전송</button>
    </div>
  </div>

  <script>
    const socket = io();

    // elements
    const loginScreen = document.getElementById("loginScreen");
    const chatScreen  = document.getElementById("chatScreen");
    const nickEl      = document.getElementById("nickname");
    const enterBtn    = document.getElementById("enterBtn");

    const countEl     = document.getElementById("count");
    const timerEl     = document.getElementById("timer");

    const chatWrap    = document.getElementById("chatWrap");
    const msgInput    = document.getElementById("msgInput");
    const sendBtn     = document.getElementById("sendBtn");

    // state
    let nickname = "";
    let timeLeft = 120;
    let timerId = null;

    // ===== iOS keyboard / viewport safe =====
    function updateViewportVars(){
      const vv = window.visualViewport;
      const height = vv ? vv.height : window.innerHeight;
      document.documentElement.style.setProperty("--vvh", height + "px");

      // 키보드가 올라오면 visualViewport.height가 줄어듦 -> 그 차이를 kb로
      const kb = Math.max(0, (window.innerHeight - height));
      document.documentElement.style.setProperty("--kb", kb + "px");
    }
    window.addEventListener("resize", updateViewportVars);
    if (window.visualViewport){
      window.visualViewport.addEventListener("resize", updateViewportVars);
      window.visualViewport.addEventListener("scroll", updateViewportVars);
    }
    updateViewportVars();

    // ===== Sounds (로그인음 유지 + 채팅은 soft 딩 고정) =====
    let audioCtx = null;
    function getCtx(){
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playLoginSound(){
      const ctx = getCtx();
      const o = ctx.createOscillator();
      o.type = "square";
      o.frequency.value = 880;
      o.connect(ctx.destination);
      o.start();
      setTimeout(()=>o.stop(),120);
    }
    function playSendSound(){
      const ctx = getCtx();
      const o = ctx.createOscillator();
      o.type = "sine";          // soft
      o.frequency.value = 500;  // 딩
      o.connect(ctx.destination);
      o.start();
      setTimeout(()=>o.stop(),90);
    }

    // ===== UI helpers =====
    function scrollBottom(){
      chatWrap.scrollTop = chatWrap.scrollHeight;
    }
    function addLine(text, cls){
      const div = document.createElement("div");
      div.className = "line " + (cls || "");
      div.textContent = text;
      chatWrap.appendChild(div);
      scrollBottom();
    }
    function addChatLine(time, nick, msg){
      // 캡처처럼: [19:50] 관리자 : ㅇㅇㅇ
      addLine(`[${time}] ${nick} : ${msg}`, "chat");
    }

    // ===== Timer =====
    function startTimer(){
      timerEl.textContent = String(timeLeft);
      if(timerId) clearInterval(timerId);
      timerId = setInterval(()=>{
        timeLeft -= 1;
        timerEl.textContent = String(Math.max(0, timeLeft));
        if(timeLeft <= 0){
          clearInterval(timerId);
          msgInput.disabled = true;
          sendBtn.disabled = true;
          addLine(`[${nowHM()}] ▶ 시간이 종료되었습니다.`, "system");
        }
      }, 1000);
    }

    function pad2(n){ return String(n).padStart(2,"0"); }
    function nowHM(){
      const d = new Date();
      return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
    }

    // ===== Enter =====
    function enter(){
      const raw = nickEl.value.trim();
      if(!raw) return;

      nickname = raw;

      loginScreen.style.display = "none";
      chatScreen.style.display = "block";

      socket.emit("join", nickname);

      // 공지 (캡처처럼)
      addLine(`[공지] X와의 채팅을 시작합니다. 2분 동안 X에게 질문을 남겨주세요.`, "notice");

      // 타이머
      timeLeft = 120;
      msgInput.disabled = false;
      sendBtn.disabled = false;
      startTimer();

      playLoginSound();
      msgInput.focus();
      updateViewportVars();
    }

    // ===== Send (IME 엔터 깨짐/중복 방지 포함) =====
    let isComposing = false;
    msgInput.addEventListener("compositionstart", ()=> isComposing = true);
    msgInput.addEventListener("compositionend", ()=> isComposing = false);

    function send(){
      const msg = msgInput.value.trim();
      if(!msg || msgInput.disabled) return;

      // 내 화면 즉시 표시
      addChatLine(nowHM(), nickname, msg);

      socket.emit("chat", msg);
      msgInput.value = "";
      playSendSound();
    }

    msgInput.addEventListener("keydown", (e)=>{
      if(isComposing || e.isComposing) return;
      if(e.key === "Enter"){
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener("click", send);
    enterBtn.addEventListener("click", enter);
    nickEl.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        e.preventDefault();
        enter();
      }
    });

    // ===== server events (네 server.js 형태 기준) =====
    socket.on("count", (n)=> { countEl.textContent = String(n); });

    socket.on("system", (msg)=>{
      // 캡처처럼: [19:50] ▶ 관리자님이 접속했습니다.
      addLine(`[${nowHM()}] ▶ ${msg}`, "system");
    });

    socket.on("notice", (nick, msg)=>{
      addLine(`[공지] ${nick} ${msg}`, "notice");
    });

    socket.on("chat", (nick, msg, time)=>{
      // 서버가 time을 주면 그걸 사용(없으면 nowHM)
      addChatLine(time || nowHM(), nick, msg);
    });
  </script>
</body>
</html>
