<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>9996</title>

<style>
@font-face {
  font-family: 'DungGeunMo';
  src: url('./fonts/DungGeunMo.woff2') format('woff2');
}

body {
  margin: 0;
  background: #0b1fa8;
  color: white;
  font-family: 'DungGeunMo', monospace;
  font-size: 18px;
}

/* CRT 효과 */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  animation: flicker 0.15s infinite;
}

@keyframes flicker {
  0% { opacity: 0.92; }
  50% { opacity: 1; }
  100% { opacity: 0.94; }
}

#login-screen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  box-sizing: border-box;
}

#login-box {
  border: 3px solid white;
  padding: 30px;
  text-align: center;
  width: 100%;
  max-width: 400px;
}

#login-box input,
#login-box button {
  width: 100%;
  box-sizing: border-box;
  margin-top: 20px;
  padding: 14px;
  font-family: 'DungGeunMo', monospace;
  font-size: 18px;
  background: #0b1fa8;
  color: white;
  border: 2px solid white;
}

#login-box button:hover {
  background: white;
  color: #0b1fa8;
}

#chat-screen {
  display: none;
  height: 100vh;
  flex-direction: column;
}

#title-wrapper {
  border: 3px solid white;
  margin: 10px;
}

#title-bar {
  display: flex;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 2px solid white;
  flex-wrap: wrap;
}

#title-name {
  background: white;
  color: #0b1fa8;
  padding: 4px 10px;
  margin-bottom: 5px;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  margin: 0 10px;
  border-left: 3px solid white;
  border-right: 3px solid white;
  font-size: 16px;
}

#input-area {
  display: flex;
  padding: 10px;
  margin: 0 10px 10px 10px;
  border: 3px solid white;
  border-top: none;
  gap: 8px;
}

#message {
  flex: 1;
  padding: 14px;
  font-size: 16px;
  font-family: 'DungGeunMo', monospace;
  background: #0b1fa8;
  color: white;
  border: 2px solid white;
}

#send-btn {
  padding: 14px 16px;
  font-size: 16px;
  font-family: 'DungGeunMo', monospace;
  background: #0b1fa8;
  color: white;
  border: 2px solid white;
}

#send-btn:hover {
  background: white;
  color: #0b1fa8;
}

.system { color: yellow; }
.time { opacity: 0.7; margin-right: 6px; }

/* 📱 모바일 최적화 */
@media (max-width: 600px) {
  body { font-size: 16px; }
  #chat { font-size: 14px; }
  #title-bar { flex-direction: column; align-items: flex-start; }
  #input-area { flex-direction: column; }
  #send-btn { width: 100%; }
}

</style>
</head>
<body>

<div id="login-screen">
  <div id="login-box">
    <div>닉네임을 입력하세요</div>
    <input id="nickname-input" />
    <button onclick="enterChat()">입장</button>
  </div>
</div>

<div id="chat-screen">
  <div id="title-wrapper">
    <div id="title-bar">
      <div id="title-name"> 9996 </div>
      <div>접속 인원: <span id="user-count">0</span></div>
    </div>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <input id="message" autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()">전송</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const chat = document.getElementById("chat");
const messageInput = document.getElementById("message");
let nickname = "";

function getTime() {
  const now = new Date();
  return now.toLocaleTimeString();
}

function enterChat() {
  const input = document.getElementById("nickname-input");
  if (!input.value.trim()) return;
  nickname = input.value.trim();
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("chat-screen").style.display = "flex";
  socket.emit("join", nickname);
  messageInput.focus();
}

function appendMessage(msg, isSystem = false) {
  const line = document.createElement("div");
  const time = document.createElement("span");
  time.className = "time";
  time.textContent = `[${getTime()}]`;
  line.appendChild(time);

  const text = document.createElement("span");
  text.textContent = msg;
  if (isSystem) text.className = "system";

  line.appendChild(text);
  chat.appendChild(line);
  chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
  const msg = messageInput.value.trim();
  if (!msg) return;
  const formatted = nickname + " > " + msg;
  appendMessage(formatted);
  socket.emit("chat message", formatted);
  messageInput.value = "";
}

messageInput.addEventListener("keydown", function(e) {
  if (e.isComposing) return;
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});

socket.on("chat message", (msg) => appendMessage(msg));
socket.on("system message", (msg) => appendMessage(msg, true));
socket.on("user count", (count) => {
  document.getElementById("user-count").textContent = count;
});

</script>

</body>
</html>
