<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>PC통신 채팅</title>
<script src="/socket.io/socket.io.js"></script>
<style>

body {
  margin:0;
  background:#00009b;
  font-family:'Courier New', monospace;
  color:white;
}

.box {
  border:3px solid white;
  padding:40px 50px;
}

#loginBox {
  width:600px;
  margin:120px auto;
  text-align:center;
  line-height:1.8;
}

#chatBox {
  display:none;
  width:85%;
  max-width:950px;
  margin:40px auto;
}

#asciiHeader {
  white-space:pre;
  margin-bottom:20px;
  font-size:14px;
}

#messages {
  height:420px;
  overflow-y:auto;
  margin:20px 0;
  line-height:1.6;
}

input, select {
  background:#00009b;
  border:2px solid white;
  color:white;
  padding:8px;
  font-family:'Courier New', monospace;
}

button {
  background:#00009b;
  border:2px solid white;
  color:white;
  padding:6px 18px;
  cursor:pointer;
}

.time { color:#aaa; font-size:12px; margin-right:6px; }
.system { color:#ffff66; }
.notice { color:#00ffff; }

</style>
</head>
<body>

<div id="loginBox" class="box">
  <h2>X와의 채팅을 시작합니다.<br/>당신의 이름은?</h2>
  <input id="nickname" /><br/><br/>

  효과음 선택:
  <select id="soundSelect">
    <option value="classic">Classic 삐빅</option>
    <option value="soft">Soft 딩</option>
    <option value="retro">Retro 노이즈</option>
  </select>
  <br/><br/>

  <button onclick="join()">입장</button>
</div>

<div id="chatBox" class="box">

<div id="asciiHeader">
+--------------------------------------------------+
|              PC-COMMUNICATION 1994              |
+--------------------------------------------------+
</div>

접속 인원: <span id="count">0</span>

<div id="messages"></div>

<input id="msgInput" onkeydown="handleKey(event)" style="width:80%" />
<button onclick="send()">전송</button>

</div>

<script>
const socket = io();
let soundMode = "classic";

function join(){
  const nick = document.getElementById("nickname").value;
  if(!nick) return;

  soundMode = document.getElementById("soundSelect").value;

  socket.emit("join", nick);
  document.getElementById("loginBox").style.display="none";
  document.getElementById("chatBox").style.display="block";

  playLoginSound();
}

function send(){
  const input = document.getElementById("msgInput");
  if(!input.value) return;
  socket.emit("chat", input.value);
  input.value="";
  playChatSound();
}

function handleKey(e){
  if(e.key === "Enter") send();
}

socket.on("chat", (nick,msg,time)=>{
  const div = document.createElement("div");
  div.innerHTML = `<span class='time'>[${time}]</span> ${nick} : ${msg}`;
  messages.appendChild(div);
  messages.scrollTop = 999999;
});

socket.on("system", (msg)=>{
  const div = document.createElement("div");
  div.className="system";
  div.innerText = msg;
  messages.appendChild(div);
});

socket.on("notice", (nick,msg)=>{
  const div = document.createElement("div");
  div.className="notice";
  div.innerText = `[공지] ${nick} : ${msg}`;
  messages.appendChild(div);
});

socket.on("count", (num)=>{
  count.innerText = num;
});

function playLoginSound(){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.type="square";
  o.frequency.value=880;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),120);
}

function playChatSound(){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const o = ctx.createOscillator();

  if(soundMode === "classic"){
    o.type="square";
    o.frequency.value=700;
  }
  else if(soundMode === "soft"){
    o.type="sine";
    o.frequency.value=500;
  }
  else{
    o.type="sawtooth";
    o.frequency.value=600;
  }

  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),80);
}

</script>
</body>
</html>
