<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>9996</title>

<style>
@font-face {
  font-family: 'DungGeunMo';
  src: url('./fonts/DungGeunMo.woff2') format('woff2');
}

html, body {
  margin: 0;
  height: 100%;
  background: #0b1fa8;
  color: white;
  font-family: 'DungGeunMo', monospace;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}

.screen {
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  border: 3px solid white;
  padding: 40px;
  width: 90%;
  max-width: 500px;
  text-align: center;
  box-sizing: border-box;
}

input, button {
  font-family: 'DungGeunMo', monospace;
  background: #0b1fa8;
  color: white;
  border: 2px solid white;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  box-sizing: border-box;
}

button {
  margin-top: 20px;
  padding: 10px 30px;
  cursor: pointer;
}

#chatScreen { display: none; flex-direction: column; }

#topBar {
  display: flex;
  justify-content: space-between;
  border-bottom: 2px solid white;
  padding: 10px;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  line-height: 1.7;
}

#inputArea {
  display: flex;
  border-top: 2px solid white;
}

#message {
  flex: 1;
  padding: 12px;
}

#timer { color: yellow; }
.system { color: yellow; }

@media(max-width:600px){
  #inputArea { flex-direction: column; }
  button { width: 100%; }
}
</style>
</head>
<body>

<div id="loginScreen" class="screen">
  <div class="box">
    X와의 채팅을 시작합니다.<br/>
    당신의 이름은?
    <input id="nickname" />
    <button onclick="enter()">입장</button>
  </div>
</div>

<div id="chatScreen" class="screen">
  <div class="box" style="display:flex;flex-direction:column;height:100%;max-width:800px;">
    <div id="topBar">
      <div>9996</div>
      <div>접속 <span id="count">0</span> | <span id="timer"></span></div>
    </div>
    <div id="chat"></div>
    <div id="inputArea">
      <input id="message" />
      <button onclick="send()">전송</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let nickname = "";
let isAdmin = false;
let timeLeft = 120;
let timerInterval;

function beep(freq=600,duration=0.1){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.type='square';
  osc.frequency.value=freq;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>{osc.stop();ctx.close();},duration*1000);
}

function enter(){
  let raw = document.getElementById("nickname").value.trim();
  if(!raw) return;

  // 👑 몰래 관리자: 이름 앞에 9996 붙이면 관리자
  if(raw.startsWith("9996")){
    isAdmin = true;
    raw = raw.replace("9996","");
  }

  nickname = raw;

  document.getElementById("loginScreen").style.display="none";
  document.getElementById("chatScreen").style.display="flex";

  socket.emit("join", {nickname,isAdmin});

  addSystem("9996 > X와의 채팅을 시작합니다. 2분 동안 질문을 남겨주세요.");
  startTimer();
  beep(400,0.2);
}

function startTimer(){
  const timerEl=document.getElementById("timer");
  timerEl.textContent=`남은시간 ${timeLeft}s`;

  timerInterval=setInterval(()=>{
    timeLeft--;
    timerEl.textContent=`남은시간 ${timeLeft}s`;
    if(timeLeft<=0){
      clearInterval(timerInterval);
      if(!isAdmin){
        document.getElementById("message").disabled=true;
        addSystem("⏳ 시간이 종료되었습니다.");
      }
    }
  },1000);
}

function send(){
  const input=document.getElementById("message");
  const msg=input.value.trim();
  if(!msg) return;

  addChat(`${nickname} > ${msg}`);
  socket.emit("chat",msg);
  input.value="";
  beep(800,0.05);
}

function addChat(text){
  const div=document.createElement("div");
  div.textContent=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=99999;
}

function addSystem(text){
  const div=document.createElement("div");
  div.textContent=text;
  div.className="system";
  document.getElementById("chat").appendChild(div);
}

socket.on("chat",msg=>addChat(msg));
socket.on("system",msg=>addSystem(msg));
socket.on("count",c=>document.getElementById("count").textContent=c);

</script>
</body>
</html>
