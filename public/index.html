<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>9996</title>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    @font-face{
      font-family:"DungGeunMo";
      src:
        url("./fonts/DungGeunMo.woff2") format("woff2"),
        url("./fonts/DungGeunMo.woff") format("woff");
      font-display:swap;
    }

    :root{
      --bg:#00009b;
      --fg:#ffffff;
      --hi:#ffff66;
      --cyan:#00ffff;

      --base: 19px;
      --topbar-h:60px;
    }

    html,body{
      margin:0; padding:0; height:100%;
      background:var(--bg); color:var(--fg);
      font-family:"DungGeunMo", monospace;
      font-size: var(--base);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      letter-spacing: 0px;
      overflow: hidden;
    }
    input, button{
      font-family: inherit;
      font-size: inherit;
      color: var(--fg);
      letter-spacing: 0px;
    }

    /* ✅ CRT 스캔라인 + 깜빡임(플리커) */
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.055) 0px,
        rgba(255,255,255,0.055) 1px,
        transparent 1px,
        transparent 3px
      );
      mix-blend-mode: overlay;
      opacity:.92;
      animation: flicker .14s infinite;
    }

    /* ===== CRT 전원 켜짐 효과 ===== */

    @keyframes crtBoot {
      0% {
        opacity: 0;
        filter: brightness(2.5) blur(6px);
      }
      40% {
        opacity: 1;
        filter: brightness(1.8) blur(2px);
      }
      100% {
        opacity: 1;
        filter: brightness(1) blur(0);
      }
    }

    @keyframes flicker{
      0%{opacity:.90;}
      50%{opacity:.97;}
      100%{opacity:.92;}
    }

    #loginScreen, #chatScreen{
      position: fixed;
      inset: 0;
      height: 100dvh;
      width: 100vw;
    }

    /* LOGIN */
    #loginScreen{
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
      box-sizing:border-box;
    }
    .loginWrap{
      width: min(520px, 100%);
      text-align:center;
    }
    .loginGifBox{
      width: 220px;
      height: 220px;
      margin: 0 auto 18px;
      background: var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      border: none;
      box-sizing:border-box;
    }
    .loginGifBox img{
      width:100%;
      height:100%;
      object-fit: cover;
      image-rendering: pixelated;
      display:block;
    }

    /* ✅ 로그인 텍스트 줄간격 조금 줄임 */
    .loginTitle{
        line-height: 1.45;
        font-size: 22px;
         margin: 0 0 18px 0;
    }

    #nickname{
      width: min(420px, 92vw);
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 12px;
      font-size: 22px;
      outline:none;
      box-sizing:border-box;
      text-align:center;
      display:block;
      margin: 0 auto;
    }
    #enterBtn{
      margin-top: 16px;
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 10px 28px;
      cursor:pointer;
      font-size: 22px;
    }
    #enterBtn:active{ transform: translateY(1px); }

    /* CHAT */
    #chatScreen{
      display:none;
      box-sizing:border-box;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      overscroll-behavior: none;
    }
    .chatCol{
      height: 100%;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .topbarWrap{
      flex: 0 0 auto;
      padding-top: 10px;
      background: var(--bg);
    }
    .topbarHighlight{
      height: 12px;
      background: #0000db;
      margin: 0 12px 6px;
    }
    .topbar{
      height: calc(var(--topbar-h) - 18px);
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      padding: 0 28px;
      box-sizing:border-box;
      font-size: 24px;
      letter-spacing: 1px;
    }
    .topLeft{ justify-self:start; }
    .topCenter{ justify-self:center; font-weight:700; letter-spacing: 4px; }
    .topRight{ justify-self:end; }
    .timer{ color: var(--hi); }
    .topbarShadow{
      height: 12px;
      background: rgba(0,0,0,0.28);
      margin: 6px 12px 0;
    }

    #typingBar{
      flex: 0 0 auto;
      padding: 8px 22px 0;
      font-size: 18px;
      color: var(--hi);
      height: 26px;
      box-sizing: border-box;
      opacity: 0.95;
    }

    #chatWrap{
      flex: 1 1 auto;
      min-height: 0;
      overflow-y:auto;
      padding: 10px 22px 18px;
      box-sizing:border-box;
      font-size: 22px;
      line-height: 1.50;
      -webkit-overflow-scrolling: touch;
    }

    .line{ white-space: pre-wrap; }
    .notice{ color: var(--cyan); }
    .system{ color: var(--hi); }
    .chat{ color: var(--fg); }

    .inputbar{
      flex: 0 0 auto;
      display:grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 18px 18px calc(18px + env(safe-area-inset-bottom));
      background: var(--bg);
      box-sizing:border-box;
    }
    #msgInput{
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 14px 14px;
      font-size: 22px;
      outline:none;
    }
    #sendBtn{
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 14px 22px;
      font-size: 22px;
      cursor:pointer;
    }
    #sendBtn:active{ transform: translateY(1px); }

    @media (max-width: 700px){
      :root{ --base:17px; --topbar-h:56px; }
      .loginGifBox{ width: 180px; height: 180px; }
      .loginTitle{ font-size: 20px; }
      #nickname, #enterBtn{ font-size: 20px; }
      .topbar{ font-size: 20px; padding: 0 20px; }
      #typingBar{ padding: 8px 16px 0; }
      #chatWrap{ font-size: 18px; padding: 10px 16px 16px; }
      #msgInput, #sendBtn{ font-size: 18px; }
      .inputbar{ gap: 12px; }
      .topbarHighlight, .topbarShadow{ margin-left: 10px; margin-right: 10px; }
    }
  </style>
</head>

<body>
  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="loginWrap">
      <div class="loginGifBox">
        <img src="./media/login.gif" alt="" />
      </div>

      <div class="loginTitle">
        X와의 채팅을 시작합니다.<br/>
        당신의 이름은?
      </div>

      <input id="nickname" autocomplete="off" />
      <button id="enterBtn" type="button">입장</button>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chatScreen">
    <div class="chatCol">
      <div class="topbarWrap">
        <div class="topbarHighlight"></div>
        <div class="topbar">
          <div class="topLeft">접속 인원: <span id="count">0</span></div>
          <div class="topCenter">9996</div>
          <div class="topRight">남은 시간: <span class="timer" id="timer">120</span>초</div>
        </div>
        <div class="topbarShadow"></div>
      </div>

      <div id="typingBar"></div>
      <div id="chatWrap" aria-live="polite"></div>

      <div class="inputbar">
        <input id="msgInput" autocomplete="off" />
        <button id="sendBtn" type="button">전송</button>
      </div>
    </div>
  </div>

  <script>
    const socket = io();

    const loginScreen = document.getElementById("loginScreen");
    const chatScreen  = document.getElementById("chatScreen");
    const nickEl      = document.getElementById("nickname");
    const enterBtn    = document.getElementById("enterBtn");

    const countEl     = document.getElementById("count");
    const timerEl     = document.getElementById("timer");

    const typingBar   = document.getElementById("typingBar");
    const chatWrap    = document.getElementById("chatWrap");
    const msgInput    = document.getElementById("msgInput");
    const sendBtn     = document.getElementById("sendBtn");

    let isAdmin = false;
    let locked = false;

    // sounds (chat = soft 딩)
    let audioCtx = null;
    function getCtx(){
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playLoginSound(){
      const ctx = getCtx();
      const o = ctx.createOscillator();
      o.type = "square";
      o.frequency.value = 880;
      o.connect(ctx.destination);
      o.start();
      setTimeout(()=>o.stop(),120);
    }
    function playSendSound(){
      const ctx = getCtx();
      const o = ctx.createOscillator();
      o.type = "sine";
      o.frequency.value = 500;
      o.connect(ctx.destination);
      o.start();
      setTimeout(()=>o.stop(),90);
    }

    function scrollBottom(){
      chatWrap.scrollTop = chatWrap.scrollHeight;
    }
    function addLine(text, cls){
      const div = document.createElement("div");
      div.className = "line " + (cls || "");
      div.textContent = text;
      chatWrap.appendChild(div);
      scrollBottom();
    }

    // 로그인 엔터 버그 방지
    let nickComposing = false;
    nickEl.addEventListener("compositionstart", ()=> nickComposing = true);
    nickEl.addEventListener("compositionend", ()=> nickComposing = false);

    function enter(){
      const raw = nickEl.value.trim();
      if(!raw) return;

      loginScreen.style.display = "none";
      chatScreen.style.display  = "block";

      socket.emit("join", raw);
      playLoginSound();
      setTimeout(() => msgInput.focus(), 30);
    }

    nickEl.addEventListener("keydown", (e)=>{
      if (nickComposing || e.isComposing) return;
      if (e.key === "Enter"){
        e.preventDefault();
        e.stopPropagation();
        enter();
      }
    });
    enterBtn.addEventListener("click", enter);

    // send (IME)
    let composing = false;
    msgInput.addEventListener("compositionstart", ()=> composing = true);
    msgInput.addEventListener("compositionend", ()=> composing = false);

    function setInputEnabled(enabled){
      msgInput.disabled = !enabled;
      sendBtn.disabled = !enabled;
    }

    function send(){
      const msg = msgInput.value.trim();
      if(!msg) return;
      if (locked && !isAdmin) return;

      socket.emit("chat", msg);
      msgInput.value = "";
      playSendSound();
      socket.emit("typing", false);
    }

    msgInput.addEventListener("keydown", (e)=>{
      if(composing || e.isComposing) return;
      if(e.key === "Enter"){
        e.preventDefault();
        send();
      }
    });
    sendBtn.addEventListener("click", send);

    // 타이핑 ping
    let typingPingTimer = null;
    function pingTyping(){
      socket.emit("typing", true);
      if (typingPingTimer) clearTimeout(typingPingTimer);
      typingPingTimer = setTimeout(()=> socket.emit("typing", false), 1400);
    }
    msgInput.addEventListener("input", ()=>{
      if (locked && !isAdmin) return;
      if (msgInput.value.trim().length === 0) {
        socket.emit("typing", false);
        return;
      }
      pingTyping();
    });
    msgInput.addEventListener("blur", ()=> socket.emit("typing", false));

    // socket events
    socket.on("admin", ()=> { isAdmin = true; setInputEnabled(!locked || isAdmin); });
    socket.on("count", (n)=> { countEl.textContent = String(n); });

    socket.on("state", (st)=>{
      // running은 표시만(원하면 “진행중” 표시도 가능)
      timerEl.textContent = String(st.remaining);
      locked = !!st.locked;
      setInputEnabled(!locked || isAdmin);
    });

    socket.on("tick", (sec)=>{ timerEl.textContent = String(sec); });

    socket.on("locked", (v)=>{
      locked = !!v;
      setInputEnabled(!locked || isAdmin);
    });

    socket.on("typing", (text)=>{ typingBar.textContent = text || ""; });

    socket.on("system", (msg)=>{ addLine(msg, "system"); });
    socket.on("notice", (_nick, msg)=>{ addLine(`[공지] ${msg}`, "notice"); });
    socket.on("chat", (nick, msg, time)=>{ addLine(`[${time}] ${nick} : ${msg}`, "chat"); });

    setInputEnabled(true);
  </script>
</body>
</html>
