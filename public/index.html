<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>9996</title>
<script src="/socket.io/socket.io.js"></script>

<style>

/* ===== 둥근모꼴 폰트 ===== */
@font-face {
  font-family: 'DungGeunMo';
  src: url('./fonts/DungGeunMo.woff') format('woff');
}

body {
  margin:0;
  background:#00009b;
  font-family:'DungGeunMo', monospace;
  color:white;
}

/* ===== 상단 타이틀 ===== */
.header {
  background:#00009b;
  border-bottom:3px solid white;
  padding:12px 20px;
  font-size:18px;
}

.box {
  border:3px solid white;
  padding:20px 25px; /* 여백 줄임 */
}

/* ===== 로그인 ===== */
#loginBox {
  width:420px;
  margin:100px auto;
  text-align:center;
  line-height:2;
}

#chatBox {
  display:none;
  width:85%;
  max-width:900px;
  margin:30px auto;
}

#messages {
  height:420px;
  overflow-y:auto;
  margin:20px 0;
  line-height:1.7;
}

input {
  background:#00009b;
  border:2px solid white;
  color:white;
  padding:6px;
  font-family:'DungGeunMo', monospace;
}

button {
  background:#00009b;
  border:2px solid white;
  color:white;
  padding:5px 15px;
  cursor:pointer;
}

.time { color:#aaa; font-size:12px; margin-right:6px; }
.system { color:#ffff66; }
.notice { color:#00ffff; }

</style>
</head>
<body>

<div class="header">
  9996 통신망 접속
</div>

<div id="loginBox" class="box">
  <div>
    X와의 채팅을 시작합니다.<br/>
    당신의 이름은?
  </div>
  <br/>
  <input id="nickname" />
  <br/><br/>
  <button onclick="join()">입장</button>
</div>

<div id="chatBox" class="box">

접속 인원: <span id="count">0</span>

<div id="messages"></div>

<input id="msgInput" onkeydown="handleKey(event)" style="width:80%" />
<button onclick="send()">전송</button>

</div>

<script>
const socket = io();

/* ===== 로그인 ===== */
function join(){
  const nick = document.getElementById("nickname").value;
  if(!nick) return;

  socket.emit("join", nick);
  document.getElementById("loginBox").style.display="none";
  document.getElementById("chatBox").style.display="block";

  playLoginSound();
}

/* ===== 채팅 ===== */
function send(){
  const input = document.getElementById("msgInput");
  if(!input.value) return;

  socket.emit("chat", input.value);
  input.value="";
  playChatSound();
}

function handleKey(e){
  if(e.key === "Enter") send();
}

socket.on("chat", (nick,msg,time)=>{
  const div = document.createElement("div");
  div.innerHTML = `<span class='time'>[${time}]</span> ${nick} : ${msg}`;
  messages.appendChild(div);
  messages.scrollTop = 999999;
});

socket.on("system", (msg)=>{
  const div = document.createElement("div");
  div.className="system";
  div.innerText = msg;
  messages.appendChild(div);
});

socket.on("notice", (nick,msg)=>{
  const div = document.createElement("div");
  div.className="notice";
  div.innerText = `[공지] ${nick} : ${msg}`;
  messages.appendChild(div);
});

socket.on("count", (num)=>{
  count.innerText = num;
});

/* ===== 효과음 ===== */

function playLoginSound(){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.type="square";
  o.frequency.value=880;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),120);
}

/* soft 딩으로 고정 */
function playChatSound(){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.type="sine";
  o.frequency.value=500;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),90);
}

</script>
</body>
</html>
