<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>9996</title>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    @font-face{
      font-family:"DungGeunMo";
      src:
        url("./fonts/DungGeunMo.woff2") format("woff2"),
        url("./fonts/DungGeunMo.woff") format("woff");
      font-display:swap;
    }

    :root{
      --bg:#00009b;
      --fg:#ffffff;
      --hi:#ffff66;
      --cyan:#00ffff;

      --base: 19px;
      --topbar-h:60px;
    }

    html,body{
      margin:0; padding:0; height:100%;
      background:var(--bg); color:var(--fg);
      font-family:"DungGeunMo", monospace;
      font-size: var(--base);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overflow: hidden;
    }
    input, button{
      font-family: inherit;
      font-size: inherit;
      color: var(--fg);
    }

    /* CRT scanline + flicker */
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.055) 0px,
        rgba(255,255,255,0.055) 1px,
        transparent 1px,
        transparent 3px
      );
      mix-blend-mode: overlay;
      opacity:.92;
      animation: flicker .14s infinite;
    }
    @keyframes flicker{
      0%{opacity:.90;}
      50%{opacity:.97;}
      100%{opacity:.92;}
    }

    /* ✅ 로그인 -> 채팅 전환 CRT 연출 */
    @keyframes crtSwitch {
      0% {
        transform: scaleY(0.02);
        opacity: 0;
        filter: brightness(3);
      }
      40% {
        transform: scaleY(1.2);
        opacity: 1;
        filter: brightness(2);
      }
      70% {
        transform: scaleY(0.95);
        filter: brightness(1.4);
      }
      100% {
        transform: scaleY(1);
        filter: brightness(1);
      }
    }
    .crt-enter {
      animation: crtSwitch 0.28s ease-out;
      transform-origin: center;
    }

    #loginScreen, #chatScreen{
      position: fixed;
      inset: 0;
      height: 100dvh;
      width: 100vw;
    }

    /* LOGIN */
    #loginScreen{
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
      box-sizing:border-box;
    }
    .loginWrap{
      width: min(520px, 100%);
      text-align:center;
    }
    .loginGifBox{
      width: 190px;
      height: 190px;
      margin: 0 auto 18px;
      background: var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      border: none;
      box-sizing:border-box;
    }
    .loginGifBox img{
      width:100%;
      height:100%;
      object-fit: cover;
      image-rendering: pixelated;
      display:block;
    }

    /* ✅ 요청: line-height 1.25 + font-size 20px */
    .loginTitle{
      line-height: 1.25;
      font-size: 20px;
      margin: 0 0 26px 0;
    }

    #nickname{
      width: min(420px, 92vw);
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 12px;
      font-size: 22px;
      outline:none;
      box-sizing:border-box;
      text-align:center;
      display:block;
      margin: 0 auto;
    }
    #enterBtn{
      margin-top: 16px;
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 10px 28px;
      cursor:pointer;
      font-size: 22px;
    }

    /* CHAT */
    #chatScreen{
      display:none;
      box-sizing:border-box;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      overscroll-behavior: none;
    }
    .chatCol{
      height: 100%;
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .topbarWrap{
      flex: 0 0 auto;
      padding-top: 10px;
      background: var(--bg);
    }
    .topbarHighlight{
      height: 12px;
      background: #0000db;
      margin: 0 12px 6px;
    }
    .topbar{
      height: calc(var(--topbar-h) - 18px);
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      padding: 0 28px;
      box-sizing:border-box;
      font-size: 24px;
      letter-spacing: 1px;
    }
    .topLeft{ justify-self:start; }
    .topCenter{ justify-self:center; font-weight:700; letter-spacing: 4px; }
    .topRight{ justify-self:end; }
    .timer{ color: var(--hi); }
    .topbarShadow{
      height: 12px;
      background: rgba(0,0,0,0.28);
      margin: 6px 12px 0;
    }

    /* 상태줄(타이핑만) */
    #statusBar{
      flex: 0 0 auto;
      padding: 8px 22px 0;
      font-size: 18px;
      color: var(--hi);
      height: 26px;
      box-sizing: border-box;
      opacity: 0.95;
      display:flex;
      align-items:center;
    }
    #typingText{ flex: 1; }

    #chatWrap{
      flex: 1 1 auto;
      min-height: 0;
      overflow-y:auto;
      padding: 10px 22px 18px;
      box-sizing:border-box;
      font-size: 22px;
      line-height: 1.50;
      -webkit-overflow-scrolling: touch;
    }
    .line{ white-space: pre-wrap; }
    .notice{ color: var(--cyan); }
    .system{ color: var(--hi); }
    .chat{ color: var(--fg); }

    /* INPUT + 블록 커서 */
    .inputbar{
      flex: 0 0 auto;
      display:grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 18px 18px calc(18px + env(safe-area-inset-bottom));
      background: var(--bg);
      box-sizing:border-box;
    }
    #msgWrap{
      position: relative;
      width: 100%;
    }
    #msgInput{
      width: 100%;
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 14px 14px;
      font-size: 22px;
      outline:none;
      caret-color: transparent;
    }
    #measure{
      position:absolute;
      left:-9999px;
      top:-9999px;
      white-space: pre;
      font-size: 22px;
      font-family:"DungGeunMo", monospace;
    }
    #blockCaret{
      position:absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--fg);
      pointer-events:none;
      animation: blink 1s steps(1,end) infinite;
      font-size: 22px;
      line-height: 1;
    }
    @keyframes blink{
      0%,49%{opacity:1;}
      50%,100%{opacity:0;}
    }

    #sendBtn{
      border: 2px solid var(--fg);
      background: var(--bg);
      padding: 14px 22px;
      font-size: 22px;
      cursor:pointer;
    }

    /* F2 접속자 패널 */
    #userPanel{
      position: fixed;
      right: 18px;
      top: 90px;
      width: min(320px, 88vw);
      border: 2px solid var(--fg);
      background: rgba(0,0,0,0.15);
      padding: 12px 12px 10px;
      display:none;
      box-sizing:border-box;
      z-index: 50;
    }
    #userPanelTitle{
      color: var(--hi);
      margin-bottom: 10px;
      font-size: 18px;
    }
    #userList{
      max-height: 45vh;
      overflow:auto;
      line-height: 1.5;
      font-size: 18px;
    }

    @media (max-width: 700px){
      :root{ --base:17px; --topbar-h:56px; }
      .topbar{ font-size: 20px; padding: 0 20px; }
      #statusBar{ padding: 8px 16px 0; }
      #chatWrap{ font-size: 18px; padding: 10px 16px 16px; }
      #msgInput, #sendBtn, #blockCaret, #measure{ font-size: 18px; }
      #msgInput{ padding: 12px; }
    }
  </style>
</head>

<body>
  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="loginWrap">
      <div class="loginGifBox">
        <img src="./media/login.gif" alt="" />
      </div>

      <div class="loginTitle">
        X와의 채팅을 시작합니다.<br/>
        당신의 이름은?
      </div>

      <input id="nickname" autocomplete="off" />
      <button id="enterBtn" type="button">입장</button>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chatScreen">
    <div class="chatCol">
      <div class="topbarWrap">
        <div class="topbarHighlight"></div>
        <div class="topbar">
          <div class="topLeft">접속 인원: <span id="count">0</span></div>
          <div class="topCenter">9996</div>
          <div class="topRight">남은 시간: <span class="timer" id="timer">120</span>초</div>
        </div>
        <div class="topbarShadow"></div>
      </div>

      <div id="statusBar">
        <div id="typingText"></div>
      </div>

      <div id="chatWrap" aria-live="polite"></div>

      <div class="inputbar">
        <div id="msgWrap">
          <input id="msgInput" autocomplete="off" />
          <span id="blockCaret">█</span>
          <span id="measure"></span>
        </div>
        <button id="sendBtn" type="button">전송</button>
      </div>
    </div>

    <!-- F2 접속자 패널 -->
    <div id="userPanel">
      <div id="userPanelTitle">접속자 목록 (F2 닫기 / ESC 닫기)</div>
      <div id="userList"></div>
    </div>
  </div>

  <script>
    const socket = io();

    const loginScreen = document.getElementById("loginScreen");
    const chatScreen  = document.getElementById("chatScreen");
    const nickEl      = document.getElementById("nickname");
    const enterBtn    = document.getElementById("enterBtn");

    const countEl     = document.getElementById("count");
    const timerEl     = document.getElementById("timer");

    const typingText  = document.getElementById("typingText");

    const chatWrap    = document.getElementById("chatWrap");
    const msgInput    = document.getElementById("msgInput");
    const sendBtn     = document.getElementById("sendBtn");

    const caretEl     = document.getElementById("blockCaret");
    const measureEl   = document.getElementById("measure");

    const userPanel   = document.getElementById("userPanel");
    const userListEl  = document.getElementById("userList");

    let isAdmin = false;
    let locked = false;

    // 랜덤 접속음
    let audioCtx = null;
    function getCtx(){
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function beep(freq, type, dur){
      const ctx = getCtx();
      const o = ctx.createOscillator();
      o.type = type;
      o.frequency.value = freq;
      o.connect(ctx.destination);
      o.start();
      setTimeout(()=>o.stop(), dur);
    }
    function playLoginSoundRandom(){
      const r = Math.random();
      if (r < 0.34){
        beep(660, "square", 70);
        setTimeout(()=>beep(880, "square", 90), 80);
        setTimeout(()=>beep(740, "square", 70), 190);
      } else if (r < 0.67){
        beep(900, "square", 120);
      } else {
        beep(760, "square", 80);
        setTimeout(()=>beep(760, "square", 80), 120);
      }
    }
    function playSendSound(){
      beep(500, "sine", 90);
    }

    function scrollBottom(){
      chatWrap.scrollTop = chatWrap.scrollHeight;
    }
    function addLine(text, cls){
      const div = document.createElement("div");
      div.className = "line " + (cls || "");
      div.textContent = text;
      chatWrap.appendChild(div);
      scrollBottom();
    }

    // 블록 커서 위치
    function updateBlockCaret(){
      const paddingLeft = 14;
      const inputStyle = getComputedStyle(msgInput);
      measureEl.style.font = inputStyle.font;
      measureEl.textContent = msgInput.value || "";
      const w = measureEl.getBoundingClientRect().width;
      caretEl.style.left = (paddingLeft + w) + "px";
      caretEl.style.opacity = (msgInput.disabled ? "0" : "");
    }
    msgInput.addEventListener("input", updateBlockCaret);
    msgInput.addEventListener("focus", updateBlockCaret);
    window.addEventListener("resize", updateBlockCaret);

    // 로그인 엔터 버그 방지
    let nickComposing = false;
    nickEl.addEventListener("compositionstart", ()=> nickComposing = true);
    nickEl.addEventListener("compositionend", ()=> nickComposing = false);

    function enter(){
      const raw = nickEl.value.trim();
      if(!raw) return;

      loginScreen.style.display = "none";
      chatScreen.style.display  = "block";

      // ✅ 전환 연출 적용
      chatScreen.classList.add("crt-enter");

      socket.emit("join", raw);
      playLoginSoundRandom();

      setTimeout(() => {
        msgInput.focus();
        updateBlockCaret();
        socket.emit("req_users");
      }, 30);
    }

    nickEl.addEventListener("keydown", (e)=>{
      if (nickComposing || e.isComposing) return;
      if (e.key === "Enter"){
        e.preventDefault();
        e.stopPropagation();
        enter();
      }
    });
    enterBtn.addEventListener("click", enter);

    // send / typing
    let composing = false;
    msgInput.addEventListener("compositionstart", ()=> composing = true);
    msgInput.addEventListener("compositionend", ()=> composing = false);

    function setInputEnabled(enabled){
      msgInput.disabled = !enabled;
      sendBtn.disabled = !enabled;
      updateBlockCaret();
    }

    function send(){
      const msg = msgInput.value.trim();
      if(!msg) return;
      if (locked && !isAdmin) return;

      socket.emit("chat", msg);
      msgInput.value = "";
      playSendSound();
      socket.emit("typing", false);
      updateBlockCaret();
    }

    msgInput.addEventListener("keydown", (e)=>{
      if(composing || e.isComposing) return;
      if(e.key === "Enter"){
        e.preventDefault();
        send();
      }
    });
    sendBtn.addEventListener("click", send);

    // 타이핑 ping
    let typingPingTimer = null;
    function pingTyping(){
      socket.emit("typing", true);
      if (typingPingTimer) clearTimeout(typingPingTimer);
      typingPingTimer = setTimeout(()=> socket.emit("typing", false), 1400);
    }
    msgInput.addEventListener("input", ()=>{
      if (locked && !isAdmin) return;
      if (msgInput.value.trim().length === 0) {
        socket.emit("typing", false);
        return;
      }
      pingTyping();
    });
    msgInput.addEventListener("blur", ()=> socket.emit("typing", false));

    // F2 접속자 패널
    function toggleUserPanel(force){
      const show = (typeof force === "boolean") ? force : (userPanel.style.display !== "block");
      userPanel.style.display = show ? "block" : "none";
      if (show) socket.emit("req_users");
    }
    document.addEventListener("keydown", (e)=>{
      if (e.key === "F2"){
        e.preventDefault();
        toggleUserPanel();
      }
      if (e.key === "Escape"){
        toggleUserPanel(false);
      }
    });

    function renderUserList(list){
      if (!Array.isArray(list)) return;
      userListEl.textContent = "";
      list.forEach((name) => {
        const div = document.createElement("div");
        div.textContent = "- " + name;
        userListEl.appendChild(div);
      });
    }

    // socket events
    socket.on("admin", ()=> { isAdmin = true; setInputEnabled(!locked || isAdmin); });
    socket.on("users", (list)=> renderUserList(list));
    socket.on("count", (n)=> { countEl.textContent = String(n); });

    socket.on("state", (st)=>{
      timerEl.textContent = String(st.remaining);
      locked = !!st.locked;
      setInputEnabled(!locked || isAdmin);
    });

    socket.on("tick", (sec)=>{ timerEl.textContent = String(sec); });

    socket.on("locked", (v)=>{
      locked = !!v;
      setInputEnabled(!locked || isAdmin);
    });

    socket.on("typing", (text)=>{ typingText.textContent = text || ""; });

    socket.on("system", (msg)=>{ addLine(msg, "system"); });
    socket.on("notice", (_nick, msg)=>{ addLine(`[공지] ${msg}`, "notice"); });
    socket.on("chat", (nick, msg, time)=>{ addLine(`[${time}] ${nick} : ${msg}`, "chat"); });

    setInputEnabled(true);
  </script>
</body>
</html>
